<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#211E2E">
<title>Promptų Akademija</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Promptų Akademija">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#211E2E;
    --bg-alt:#191722;
    --card:#2C2840;
    --card-hi:#342F4C;
    --ink:#EDE8DC;
    --ink-dim:#B4AEA3;
    --line:rgba(237,232,220,.12);
    --accent:#E8A33D;
    --accent-ink:#211E2E;
    --teal:#4FB6A8;
    --amber:#E8A33D;
    --coral:#E86C5D;
    --peri:#7C93F0;
    --sage:#8FAE6B;
    --azure:#5FA8D3;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(232,163,61,.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  header.top{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--bg) 70%,transparent);
    backdrop-filter:blur(6px);
    padding:calc(env(safe-area-inset-top) + 16px) 20px 10px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;background:var(--card);
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;
    border:1px solid var(--line);
  }
  .brand h1{font-size:20px;margin:0;font-weight:600;}
  .icon-btn{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);display:flex;align-items:center;justify-content:center;
    font-size:17px;cursor:pointer;
  }
  .icon-btn:active{background:var(--card-hi);}

  main{flex:1;padding:6px 20px 40px;}

  /* Home */
  .hero{padding:18px 2px 22px;}
  .hero .eyebrow{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
  .hero h2{font-size:26px;margin:6px 0 8px;line-height:1.15;}
  .hero p{color:var(--ink-dim);font-size:14.5px;line-height:1.55;margin:0;}

  .progress-strip{
    display:flex;gap:14px;margin:18px 0 6px;
  }
  .stat{
    flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;
  }
  .stat .n{font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
  .stat .l{color:var(--ink-dim);font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

  .track-list{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
  .track{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;cursor:pointer;position:relative;overflow:hidden;
  }
  .track:active{background:var(--card-hi);}
  .track::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tc,var(--accent));
  }
  .track-ic{
    width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:20px;background:color-mix(in srgb, var(--tc, var(--accent)) 20%, transparent);
    flex-shrink:0;
  }
  .track-body{flex:1;min-width:0;}
  .track-body h3{margin:0 0 3px;font-size:16.5px;font-weight:600;font-family:'Inter',sans-serif;}
  .track-body .sub{color:var(--ink-dim);font-size:12.5px;}
  .track-prog{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--tc,var(--accent));white-space:nowrap;}

  /* Category / module list */
  .back-row{display:flex;align-items:center;gap:10px;margin:8px 0 18px;color:var(--ink-dim);font-size:13.5px;cursor:pointer;}
  .cat-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .cat-head .track-ic{width:52px;height:52px;font-size:24px;}
  .cat-head h2{margin:0;font-size:22px;}
  .cat-head .sub{color:var(--ink-dim);font-size:13px;margin-top:2px;}
  .bar{height:6px;border-radius:4px;background:var(--card);overflow:hidden;margin-bottom:18px;}
  .bar-fill{height:100%;background:var(--tc,var(--accent));border-radius:4px;transition:width .3s ease;}

  .mod-item{
    display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;
  }
  .mod-item:active{background:var(--card-hi);}
  .mod-check{
    width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:13px;
  }
  .mod-check.done{background:var(--tc,var(--accent));border-color:var(--tc,var(--accent));color:var(--accent-ink);}
  .mod-title{font-weight:600;font-size:15px;}
  .mod-sub{color:var(--ink-dim);font-size:12px;margin-top:2px;}

  /* Module view */
  .lesson-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;margin-bottom:16px;
  }
  .lesson-card h2{font-size:20px;margin:0 0 12px;}
  .lesson-card p{line-height:1.65;font-size:14.5px;color:var(--ink);margin:0 0 12px;}
  .lesson-card p:last-child{margin-bottom:0;}
  .lesson-card strong{color:var(--accent);}

  .task-card{
    background:var(--bg-alt);border:1px dashed var(--line);border-radius:var(--radius);
    padding:18px;margin-bottom:16px;
  }
  .task-card .tag{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tc,var(--accent));
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block;
  }
  .task-card p{line-height:1.6;font-size:14.5px;margin:0;}

  .console{
    background:#16141F;border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;margin-bottom:16px;
  }
  .console-head{
    display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line);
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);
  }
  .console-head .dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
  textarea.prompt-in{
    width:100%;background:transparent;border:none;color:var(--ink);
    font-family:'JetBrains Mono',monospace;font-size:16px;line-height:1.55;
    padding:14px;resize:vertical;min-height:90px;outline:none;
  }
  textarea.prompt-in::placeholder{color:#5A5568;}
  .console-actions{display:flex;gap:8px;padding:0 14px 14px;flex-wrap:wrap;}
  .quick-open{padding:0 14px 14px;border-bottom:1px solid var(--line);margin-bottom:14px;}
  .qo-label{display:block;font-size:11px;color:var(--ink-dim);margin-bottom:8px;}
  .qo-row{display:flex;gap:8px;flex-wrap:wrap;}
  .qo-btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .qo-btn:active{background:var(--card-hi);}
  .btn{
    border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:active{opacity:.85;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:active{background:var(--card-hi);}
  .btn:disabled{opacity:.45;cursor:default;}

  .response-block{padding:14px;border-top:1px solid var(--line);}
  .response-block .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block;}
  .response-text{font-size:14px;line-height:1.6;white-space:pre-wrap;}

  .grade-block{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:16px;display:none;
  }
  .grade-block.show{display:block;}
  .grade-score{
    font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--accent);
    display:inline-flex;align-items:baseline;gap:4px;
  }
  .grade-score span{font-size:14px;color:var(--ink-dim);font-family:'Inter',sans-serif;}
  .grade-feedback{margin-top:8px;font-size:14px;line-height:1.6;color:var(--ink);}

  .complete-row{display:flex;justify-content:center;margin:22px 0 6px;}
  .complete-btn{
    width:100%;padding:14px;border-radius:12px;background:var(--sage);color:#16241A;
    border:none;font-weight:700;font-size:14.5px;cursor:pointer;
  }
  .complete-btn.done{background:var(--card);color:var(--sage);border:1px solid var(--sage);}

  .empty-state{color:var(--ink-dim);font-size:13.5px;text-align:center;padding:30px 10px;}

  /* Settings modal */
  .modal-back{
    position:fixed;inset:0;background:rgba(15,13,20,.65);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .modal{
    width:100%;max-width:640px;background:var(--bg-alt);border-radius:20px 20px 0 0;
    border:1px solid var(--line);border-bottom:none;padding:22px 20px calc(env(safe-area-inset-bottom) + 22px);
    max-height:85vh;overflow-y:auto;
  }
  .modal h2{margin:0 0 4px;font-size:19px;}
  .modal .sub{color:var(--ink-dim);font-size:12.5px;margin-bottom:18px;}
  .prov-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .prov-tab{
    flex:1 1 calc(50% - 4px);min-width:90px;padding:10px 8px;text-align:center;border-radius:10px;border:1px solid var(--line);
    font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-dim);
  }
  .prov-tab.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
  label.field-lbl{display:block;font-size:12px;color:var(--ink-dim);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em;}
  input[type=password],input[type=text],select{
    width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;color:var(--ink);font-size:16px;font-family:'Inter',sans-serif;
  }
  select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink-dim) 50%),linear-gradient(135deg,var(--ink-dim) 50%,transparent 50%);background-position:calc(100% - 18px) center,calc(100% - 13px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
  .hint{font-size:11.5px;color:var(--ink-dim);margin-top:8px;line-height:1.5;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;}

  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- Data ---------- */
const CATEGORIES = [
  {
    id:'pagrindai', name:'Pagrindai', icon:'\u{1F9ED}', color:'var(--teal)', sub:'Kur pradėti prompt\u2019inimą',
    modules:[
      {
        id:'p1', title:'Kas yra geras promptas',
        theory:`<p>Promptas — tai jūsų instrukcija AI. Kuo daugiau AI žino apie <strong>tikslą, kontekstą ir formą</strong>, tuo tikslesnis bus atsakymas. Blogas promptas primena užduotį be jokio paaiškinimo — AI turi spėlioti, ko jums iš tikrųjų reikia.</p><p>Geras promptas dažniausiai turi keturis elementus: <strong>rolę</strong> (kuo AI turėtų \u201cbūti\u201d), <strong>užduotį</strong> (ką konkrečiai padaryti), <strong>kontekstą</strong> (svarbi informacija apie situaciją) ir <strong>formatą</strong> (kaip turėtų atrodyti atsakymas).</p>`,
        task:'Pasirinkite bet kurią temą (pvz., sveika mityba, asmeninės finansai, kelionė) ir parašykite promptą, kuris paprašytų AI paaiškinti šią temą taip, kad suprastų visiškas pradedantysis. Įtraukite rolę, kontekstą ir formatą.',
        tag:'Užduotis 1 / 4'
      },
      {
        id:'p2', title:'Konteksto galia',
        theory:`<p>Tas pats klausimas be konteksto ir su kontekstu duoda visiškai skirtingus atsakymus. AI negali žinoti, kad esate pradedantysis programuotojas, ar kad rašote laišką griežtam viršininkui — nebent jūs tai pasakysite.</p><p>Kontekstas apima: kas esate, kam reikia atsakymo, kokio lygio ekspertizę turite, ir kokie apribojimai galioja (laikas, biudžetas, auditorija).</p>`,
        task:'Parašykite du promptus ta pačia tema — pirmą be jokio konteksto, antrą su išsamiu kontekstu (kas esate, kam reikia atsakymo, kokiam tikslui). Paleiskite abu ir palyginkite, kaip pasikeitė atsakymo kokybė.',
        tag:'Užduotis 2 / 4'
      },
      {
        id:'p3', title:'Iteracija ir tolesni prompt\u2019ai',
        theory:`<p>Retai pirmas atsakymas yra galutinis. AI pokalbis leidžia tęsti ir tikslinti — vietoj naujo promptu nuo nulio, atsakykite į gautą rezultatą: \u201ctrumpiau\u201d, \u201cpaaiškink antrą punktą plačiau\u201d, \u201cpakeisk toną į formalesnį\u201d.</p><p>Šis \u201cpokalbio\u201d požiūris dažnai duoda geresnį rezultatą greičiau, nei bandymas iš karto parašyti tobulą promptą.</p>`,
        task:'Parašykite pradinį promptą bet kokia tema. Kai gausite atsakymą, parašykite antrą, patikslinantį promptą, kuris paprašytų sutrumpinti arba pakeisti vieną konkretų atsakymo aspektą.',
        tag:'Užduotis 3 / 4'
      },
      {
        id:'p4', title:'Dažniausios klaidos',
        theory:`<p>Trys dažniausios pradedančiųjų klaidos: <strong>neaiškumas</strong> (\u201cparašyk apie rinkodarą\u201d — apie ką konkrečiai?), <strong>per daug užduočių viename prompte</strong> (AI praleidžia dalis, jei prašote penkių dalykų iš karto), ir <strong>trūkstamas formatas</strong> (jei nesvarbu forma, gaunate atsitiktinę).</p><p>Taisyklė: jei promptą gali suprasti dviem skirtingais būdais, AI taip pat gali jį suprasti dviem būdais.</p>`,
        task:'Paimkite vieną iš savo ankstesnių promptų (ar sugalvokite naują neaiškų promptą) ir perrašykite jį taip, kad išspręstumėte bent dvi iš trijų aukščiau minėtų klaidų.',
        tag:'Užduotis 4 / 4'
      }
    ]
  },
  {
    id:'kodavimas', name:'Kodavimas', icon:'\u2328\uFE0F', color:'var(--amber)', sub:'AI kaip programavimo partneris',
    modules:[
      {
        id:'k1', title:'Prompt\u2019ai kodo generavimui',
        theory:`<p>Kodo generavimui neužtenka parašyti \u201cparašyk man funkciją\u201d. AI reikia žinoti: kalbą, aplinką (pvz., Node.js, naršyklė), įėjimo ir išėjimo formatą, bei ribinius atvejus, kuriuos reikia apdoroti.</p><p>Naudinga struktūra: <strong>kontekstas</strong> (kokiame projekte tai bus naudojama) → <strong>užduotis</strong> (konkreti funkcija) → <strong>reikalavimai</strong> (tipai, klaidų apdorojimas, stilius).</p>`,
        task:'Parašykite promptą, prašantį sugeneruoti nedidelę funkciją (pvz., patikrinti, ar el. pašto adresas tinkamas). Nurodykite kalbą, įėjimo/išėjimo formatą ir bent vieną ribinį atvejį, kurį funkcija turi apdoroti.',
        tag:'Užduotis 1 / 4'
      },
      {
        id:'k2', title:'Derinimas (debugging) su AI',
        theory:`<p>Kai kodas neveikia, neužtenka įklijuoti klaidos pranešimo. AI reikia matyti: patį kodą, tikslų klaidos tekstą, ką tikėjotės gauti ir ką gavote iš tikrųjų.</p><p>Geras debugging promptas dažnai baigiasi klausimu \u201ckoks yra labiausiai tikėtinas priežastis?\u201d, o ne tiesiog \u201cištaisyk\u201d — taip gaunate paaiškinimą, ne tik pataisytą kodą, ir patys išmokstate.</p>`,
        task:'Sugalvokite trumpą (išgalvotą) klaidos situaciją savo darbe ar mokymosi projekte. Parašykite promptą, kuris pateiktų AI kodą, klaidos pranešimą, tikėtą ir gautą rezultatą, ir paprašytų paaiškinti priežastį prieš taisant.',
        tag:'Užduotis 2 / 4'
      },
      {
        id:'k3', title:'Kodo peržiūra ir refaktoringas',
        theory:`<p>Prašant peržiūrėti ar patobulinti veikiantį kodą, svarbu nurodyti <strong>tikslą</strong> — ar norite geresnio skaitomumo, greičio, ar mažiau kodo eilučių. Be tikslo AI gali pakeisti stilių, kuris jums nebūtinai patinka.</p><p>Taip pat naudinga aiškiai pasakyti \u201cnekeisti funkcionalumo\u201d, kad refaktoringas neįneštų naujų klaidų.</p>`,
        task:'Parašykite promptą, kuris pateiktų (išgalvotą ar tikrą) kodo fragmentą ir paprašytų jį patobulinti pagal vieną konkretų kriterijų (skaitomumas, greitis, arba trumpumas), aiškiai nurodant, kad funkcionalumas turi likti tas pats.',
        tag:'Užduotis 3 / 4'
      },
      {
        id:'k4', title:'Testų generavimas',
        theory:`<p>AI gerai generuoja testus, jei nurodote testavimo karkasą (pvz., Jest, pytest) ir kokius atvejus reikia padengti — įprastą kelią, ribinius atvejus ir klaidų scenarijus.</p><p>Naudinga paprašyti, kad testai būtų nepriklausomi vienas nuo kito ir kad kiekvienas testas tikrintų vieną konkretų dalyką.</p>`,
        task:'Parašykite promptą, prašantį sugeneruoti testus jūsų k1 užduotyje sukurtai (ar panašiai) funkcijai. Nurodykite testavimo karkasą ir bent tris atvejus, kuriuos testai turi padengti.',
        tag:'Užduotis 4 / 4'
      }
    ]
  },
  {
    id:'dizainas', name:'Dizainas', icon:'\u{1F3A8}', color:'var(--coral)', sub:'Vizualinės kalbos tikslumas',
    modules:[
      {
        id:'d1', title:'Vizualiniai aprašymai',
        theory:`<p>Dizaino promptuose žodžiai turi atstoti akis. Vietoj \u201cgražus dizainas\u201d aprašykite: spalvų paletę, nuotaiką, tipografijos stilių, kompoziciją ir konkrečius pavyzdžius (\u201ckaip Šveicarų plakatai\u201d, \u201cminimalistinis, daug baltos erdvės\u201d).</p><p>Kuo konkretesnis aprašymas, tuo mažiau atsitiktinumo — neutralūs žodžiai kaip \u201cmoderniai\u201d ar \u201cšvariai\u201d beveik nieko nepasako AI.</p>`,
        task:'Parašykite promptą, aprašantį vizualinį stilių jūsų pasirinktam projektui (pvz., programėlės ekranui, plakatui). Nurodykite konkrečią spalvų paletę, tipografijos charakterį ir bent vieną referencinį stilių ar epochą.',
        tag:'Užduotis 1 / 4'
      },
      {
        id:'d2', title:'Iteracija ir tikslinimas',
        theory:`<p>Retai pirmas atsakymas būna tobulas. Efektyvus dizaino darbas su AI — tai pokalbis: gaunate variantą, tada tiksliai nurodote, kas neveikia (\u201caccent spalva per ryški\u201d, \u201cper daug elementų viršuje\u201d), o ne prašote \u201cpadaryk geriau\u201d.</p>`,
        task:'Parašykite pradinį dizaino promptą, tada — antrą promptą, kuris \u201citeruotų\u201d rezultatą, nurodydamas 2-3 konkrečius pakeitimus (ne bendrus, o konkrečius: spalvą, dydį, išdėstymą).',
        tag:'Užduotis 2 / 4'
      },

function friendlyApiError(status){
  if(status===401 || status===403) return 'Netinkamas arba negaliojantis API raktas. Patikrinkite jį nustatymuose.';
  if(status===429) return 'Viršytas užklausų limitas arba baigėsi kreditai pas šį teikėją (klaida 429). Palaukite kelias minutes arba patikrinkite savo sąskaitos limitus/balansą teikėjo svetainėje.';
  if(status===400) return 'Užklausa atmesta (400) — galimai pasirinktas modelis šiuo metu neprieinamas šiam raktui.';
  if(status>=500) return 'Teikėjo serverio klaida ('+status+'). Pabandykite dar kartą po kelių sekundžių.';
  return 'API klaida ('+status+').';
}

async function callAI(systemPrompt, userPrompt, providerOverride){
  const s = getSettings();
  const prov = providerOverride || s.activeProvider;
  const key = s.keys[prov];
  const model = s.models[prov];
  if(!key){ throw new Error('NOKEY'); }

  if(prov === 'openai'){
    const res = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model,
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
        max_tokens:700
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.choices[0].message.content;
  }

  if(prov === 'anthropic'){
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model, max_tokens:700, system:systemPrompt,
        messages:[{role:'user',content:userPrompt}]
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.content.map(b=>b.text||'').join('');
  }

  if(prov === 'perplexity'){
    const res = await fetch('https://api.perplexity.ai/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model,
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
        max_tokens:700
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.choices[0].message.content;
  }

  if(prov === 'gemini'){
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:systemPrompt}]},
        contents:[{parts:[{text:userPrompt}]}]
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.candidates[0].content.parts.map(p=>p.text||'').join('');
  }

  if(prov === 'openrouter'){
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+key,
        'X-Title':'Promptu Akademija'
      },
      body:JSON.stringify({
        model,
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
        max_tokens:700
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.choices[0].message.content;
  }

  if(prov === 'huggingface'){
    const res = await fetch('https://router.huggingface.co/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model,
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
        max_tokens:700
      })
    });
    if(!res.ok) throw new Error(friendlyApiError(res.status));
    const data = await res.json();
    return data.choices[0].message.content;
  }
}

/* ---------- Storage ---------- */
const LS_SETTINGS = 'aipa_settings_v1';
const LS_PROGRESS = 'aipa_progress_v1';

function defaultSettings(){
  return {
    activeProvider:'openai',
    keys:{openai:'',anthropic:'',gemini:'',perplexity:'',openrouter:'',huggingface:''},
    models:{openai:'gpt-4o-mini',anthropic:'claude-haiku-4-5',gemini:'gemini-2.0-flash',perplexity:'sonar',openrouter:'meta-llama/llama-3.3-70b-instruct:free',huggingface:'meta-llama/Llama-3.3-70B-Instruct'}
  };
}
function getSettings(){
  const d = defaultSettings();
  try{
    const raw = JSON.parse(localStorage.getItem(LS_SETTINGS));
    if(raw){
      return {
        activeProvider: raw.activeProvider || d.activeProvider,
        keys: Object.assign({}, d.keys, raw.keys),
        models: Object.assign({}, d.models, raw.models)
      };
    }
  }catch(e){}
  return d;
}
function saveSettings(s){ localStorage.setItem(LS_SETTINGS, JSON.stringify(s)); }

function getProgress(){
  try{
    const raw = JSON.parse(localStorage.getItem(LS_PROGRESS));
    if(raw) return raw;
  }catch(e){}
  return {completed:[], lastDate:null, streak:0};
}
function saveProgress(p){ localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); }

function markComplete(modId){
  const p = getProgress();
  if(!p.completed.includes(modId)){
    p.completed.push(modId);
    const today = new Date().toISOString().slice(0,10);
    if(p.lastDate !== today){
      const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
      p.streak = (p.lastDate === yesterday) ? p.streak+1 : 1;
      p.lastDate = today;
    }
    saveProgress(p);
  }
}

function totalModules(){ return CATEGORIES.reduce((n,c)=>n+c.modules.length,0); }

function nextIncompleteModule(){
  const progress = getProgress();
  for(const c of CATEGORIES){
    for(const m of c.modules){
      if(!progress.completed.includes(m.id)) return {catId:c.id, modId:m.id};
    }
  }
  return null;
}

/* ---------- Router / State ---------- */
let route = {view:'home'};
let settingsOpen = false;

function nav(r){ route = r; render(); window.scrollTo(0,0); }

function findModule(catId, modId){
  const cat = CATEGORIES.find(c=>c.id===catId);
  if(!cat) return null;
  const mod = cat.modules.find(m=>m.id===modId);
  return {cat, mod};
}

/* ---------- Render ---------- */
function render(){
  try{
    const app = document.getElementById('app');
    app.innerHTML = header() + body() + (settingsOpen ? settingsModal() : '');
    bindEvents();
  }catch(err){
    document.getElementById('app').innerHTML =
      '<div style="padding:40px 20px;color:#EDE8DC;font-family:Inter,sans-serif;">'+
      '<h2 style="font-family:Fraunces,serif;">Kažkas nutiko ne taip</h2>'+
      '<p style="color:#B4AEA3;font-size:13px;">Perkraukite programėlę. Jei problema kartojasi, progresas išsaugotas ir niekur nedings.</p>'+
      '<button onclick="location.reload()" style="margin-top:14px;padding:10px 16px;border-radius:10px;border:none;background:#E8A33D;color:#211E2E;font-weight:700;">Perkrauti</button>'+
      '</div>';
    console.error(err);
  }
}

function header(){
  let title = 'Promptų Akademija';
  let showBack = false;
  if(route.view==='category'){ title = CATEGORIES.find(c=>c.id===route.catId)?.name || ''; showBack = true; }
  if(route.view==='module'){ const f = findModule(route.catId, route.modId); title = f?.mod.title || ''; showBack = true; }
  return `
  <header class="top">
    <div class="brand">
      <div class="brand-mark">&gt;_</div>
      <h1>${route.view==='home' ? title : (showBack ? 'Promptų Akademija' : title)}</h1>
    </div>
    <div class="icon-btn" data-action="open-settings">⚙️</div>
  </header>`;
}

function body(){
  if(route.view==='home') return homeView();
  if(route.view==='category') return categoryView();
  if(route.view==='module') return moduleView();
  return '';
}

function providerPickerHtml(){
  const s = getSettings();
  const configured = Object.keys(PROVIDERS).filter(p=>s.keys[p]);
  if(configured.length===0) return '';
  const opts = configured.map(p=>
    `<option value="${p}" ${p===s.activeProvider?'selected':''}>${PROVIDERS[p].label.split(' ')[0]}</option>`
  ).join('');
  return `<div class="hint" style="padding:0 14px 12px;">Naudojamas teikėjas: <select id="activeProviderPicker" style="display:inline-block;width:auto;padding:4px 8px;font-size:12.5px;">${opts}</select></div>`;
}

function homeView(){
  const progress = getProgress();
  const total = totalModules();
  const done = progress.completed.length;
  const next = nextIncompleteModule();
  const nextBtn = next
    ? `<button class="btn btn-primary" style="margin-top:14px;" data-action="continue-learning">▶ ${done===0?'Pradėti mokytis':'Tęsti mokymąsi'}</button>`
    : `<div class="hint" style="margin-top:14px;">🎉 Visi moduliai atlikti — puikus darbas!</div>`;
  const tracks = CATEGORIES.map(c=>{
    const cDone = c.modules.filter(m=>progress.completed.includes(m.id)).length;
    return `
    <div class="track" style="--tc:${c.color}" data-action="open-cat" data-cat="${c.id}">
      <div class="track-ic">${c.icon}</div>
      <div class="track-body">
        <h3>${c.name}</h3>
        <div class="sub">${c.sub}</div>
      </div>
      <div class="track-prog">${cDone}/${c.modules.length}</div>
    </div>`;
  }).join('');

  return `
  <main>
    <div class="hero">
      <div class="eyebrow">Mokykis rašyti AI promptus</div>
      <h2 class="display">Išnaudokite AI iki maksimumo</h2>
      <p>Trumpos pamokos ir praktinės užduotys, kurias iš karto išbandote su tikru AI atsakymu. Pasirinkite sritį ir pradėkite.</p>
      ${nextBtn}
    </div>
    <div class="progress-strip">
      <div class="stat"><div class="n">${done}/${total}</div><div class="l">Atlikta</div></div>
      <div class="stat"><div class="n">${progress.streak}</div><div class="l">Dienų iš eilės</div></div>
    </div>
    <div class="track-list">${tracks}</div>
  </main>`;
}

function categoryView(){
  const cat = CATEGORIES.find(c=>c.id===route.catId);
  if(!cat) return '<main><div class="empty-state">Sritis nerasta.</div></main>';
  const progress = getProgress();
  const mods = cat.modules.map(m=>{
    const done = progress.completed.includes(m.id);
    return `
    <div class="mod-item" style="--tc:${cat.color}" data-action="open-mod" data-cat="${cat.id}" data-mod="${m.id}">
      <div class="mod-check ${done?'done':''}">${done?'✓':''}</div>
      <div>
        <div class="mod-title">${m.title}</div>
        <div class="mod-sub">${m.tag}</div>
      </div>
    </div>`;
  }).join('');
  return `
  <main>
    <div class="back-row" data-action="go-home">← Visos sritys</div>
    <div class="cat-head">
      <div class="track-ic" style="background:color-mix(in srgb, ${cat.color} 20%, transparent);">${cat.icon}</div>
      <div>
        <h2>${cat.name}</h2>
        <div class="sub">${cat.sub}</div>
      </div>
    </div>
    <div class="bar" style="--tc:${cat.color}"><div class="bar-fill" style="width:${Math.round(100*cat.modules.filter(m=>progress.completed.includes(m.id)).length/cat.modules.length)}%"></div></div>
    ${mods}
  </main>`;
}

function moduleView(){
  const f = findModule(route.catId, route.modId);
  if(!f) return '<main><div class="empty-state">Pamoka nerasta.</div></main>';
  const {cat, mod} = f;
  const progress = getProgress();
  const isDone = progress.completed.includes(mod.id);
  return `
  <main>
    <div class="back-row" data-action="open-cat" data-cat="${cat.id}">← ${cat.name}</div>
    <div class="lesson-card">
      <h2>${mod.title}</h2>
      ${mod.theory}
    </div>
    <div class="task-card" style="--tc:${cat.color}">
      <span class="tag">${mod.tag}</span>
      <p>${mod.task}</p>
    </div>
    <div class="console">
      <div class="console-head"><span class="dot"></span> jūsų promptas</div>
      <textarea class="prompt-in mono" id="promptInput" placeholder="Rašykite savo promptą čia...">${escapeHtml(localStorage.getItem('aipa_draft_'+mod.id)||'')}</textarea>
      <div class="quick-open">
        <span class="qo-label">Nemokamai: nukopijuos promptą ir atidarys pokalbį</span>
        <div class="qo-row">
          <button class="qo-btn" data-action="open-app" data-url="https://chat.openai.com">ChatGPT ↗</button>
          <button class="qo-btn" data-action="open-app" data-url="https://claude.ai/new">Claude ↗</button>
          <button class="qo-btn" data-action="open-app" data-url="https://gemini.google.com/app">Gemini ↗</button>
          <button class="qo-btn" data-action="open-app" data-url="https://www.perplexity.ai">Perplexity ↗</button>
          <button class="qo-btn" data-action="open-app" data-url="https://huggingface.co/chat">HuggingChat (Llama/Qwen/Mistral/Gemma) ↗</button>
        </div>
      </div>
      <div class="console-actions">
        <button class="btn btn-primary" data-action="run-prompt">▶ Vykdyti per API</button>
        <button class="btn btn-ghost" data-action="grade-prompt">★ Gauti atsiliepimą</button>
      </div>
      ${providerPickerHtml()}
      <div id="responseArea"></div>
    </div>
    <div class="grade-block" id="gradeBlock"></div>
    <div class="complete-row">
      <button class="complete-btn ${isDone?'done':''}" data-action="complete-mod" data-mod="${mod.id}">
        ${isDone ? '✓ Pažymėta kaip atlikta' : 'Pažymėti kaip atlikta'}
      </button>
    </div>
  </main>`;
}

function settingsModal(){
  const s = getSettings();
  const prov = s.activeProvider;
  const tabs = Object.keys(PROVIDERS).map(id=>
    `<div class="prov-tab ${id===prov?'active':''}" data-action="set-provider" data-prov="${id}">${PROVIDERS[id].label.split(' ')[0]}</div>`
  ).join('');
  const modelOpts = PROVIDERS[prov].models.map(m=>
    `<option value="${m}" ${m===s.models[prov]?'selected':''}>${m}</option>`
  ).join('');
  const modelField = PROVIDERS[prov].customModel
    ? `<input type="text" id="modelSelect" list="orModelList" value="${s.models[prov]||PROVIDERS[prov].models[0]}" placeholder="pvz. meta-llama/llama-3.3-70b-instruct:free">
       <datalist id="orModelList">${PROVIDERS[prov].models.map(m=>`<option value="${m}">`).join('')}</datalist>`
    : `<select id="modelSelect">${modelOpts}</select>`;
  return `
  <div class="modal-back" data-action="close-settings">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>AI prieigos nustatymai (nebūtina)</h2>
      <div class="sub">Programėlę galite naudoti visiškai nemokamai su savo esama ChatGPT/Claude/Gemini paskyra — tiesiog kopijuokite promptą mygtukais pamokoje. Raktą pridėkite tik jei norite, kad programėlė vykdytų promptus automatiškai (tada mokate pagal API teikėjo tarifus, nebent naudojate nemokamus OpenRouter modelius). Raktas saugomas tik jūsų telefone, niekur nesiunčiamas.</div>
      <div class="prov-tabs">${tabs}</div>
      <label class="field-lbl">API raktas — ${PROVIDERS[prov].label}</label>
      <input type="password" id="apiKeyInput" placeholder="${PROVIDERS[prov].keyPlaceholder||'sk-...'}" value="${s.keys[prov]||''}">
      <div class="hint">${PROVIDERS[prov].keyHint}</div>
      <label class="field-lbl">Modelis</label>
      ${modelField}
      <div class="modal-actions">
        <button class="btn btn-ghost" data-action="close-settings">Atšaukti</button>
        <button class="btn btn-primary" data-action="save-settings">Išsaugoti</button>
      </div>
      <div class="hint" style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px;">
        Norite pradėti mokymąsi iš naujo?
        <span style="color:var(--coral);cursor:pointer;text-decoration:underline;" data-action="reset-progress">Išvalyti progresą</span>
      </div>
    </div>
  </div>`;
}

/* ---------- Events ---------- */
function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });
  const ta = document.getElementById('promptInput');
  if(ta && route.view==='module'){
    ta.addEventListener('input', ()=>{
      localStorage.setItem('aipa_draft_'+route.modId, ta.value);
    });
  }
  const pp = document.getElementById('activeProviderPicker');
  if(pp){
    pp.addEventListener('change', ()=>{
      const s = getSettings();
      s.activeProvider = pp.value;
      saveSettings(s);
    });
  }
}

function onAction(e){
  const el = e.currentTarget;
  const action = el.dataset.action;
  if(action==='open-cat') nav({view:'category', catId:el.dataset.cat});
  else if(action==='continue-learning'){
    const next = nextIncompleteModule();
    if(next) nav({view:'module', catId:next.catId, modId:next.modId});
  }
  else if(action==='open-mod') nav({view:'module', catId:el.dataset.cat, modId:el.dataset.mod});
  else if(action==='go-home') nav({view:'home'});
  else if(action==='open-settings'){ settingsOpen=true; render(); }
  else if(action==='close-settings'){ settingsOpen=false; render(); }
  else if(action==='set-provider'){
    const s = getSettings(); s.activeProvider = el.dataset.prov; saveSettings(s); render();
  }
  else if(action==='save-settings'){
    const s = getSettings();
    const key = document.getElementById('apiKeyInput').value.trim();
    const model = document.getElementById('modelSelect').value;
    s.keys[s.activeProvider] = key;
    s.models[s.activeProvider] = model;
    saveSettings(s);
    settingsOpen=false; render();
  }
  else if(action==='reset-progress'){
    if(confirm('Ar tikrai norite ištrinti visą mokymosi progresą? Šio veiksmo negalima atšaukti.')){
      saveProgress({completed:[], lastDate:null, streak:0});
      settingsOpen=false; render();
    }
  }
  else if(action==='open-app'){
    const input = document.getElementById('promptInput');
    const text = input ? input.value.trim() : '';
    if(text) navigator.clipboard.writeText(text).catch(()=>{});
    window.open(el.dataset.url, '_blank');
    const original = el.textContent;
    el.textContent = 'Nukopijuota ✓';
    setTimeout(()=>{ el.textContent = original; }, 1600);
  }
  else if(action==='run-prompt') runPrompt();
  else if(action==='grade-prompt') gradePrompt();
  else if(action==='complete-mod'){ markComplete(el.dataset.mod); render(); }
}

function providersWithKeys(){
  const s = getSettings();
  const rest = Object.keys(PROVIDERS).filter(p => p!==s.activeProvider && s.keys[p]);
  const ordered = s.keys[s.activeProvider] ? [s.activeProvider, ...rest] : rest;
  return ordered;
}

async function runPrompt(){
  const input = document.getElementById('promptInput').value.trim();
  if(!input) return;
  const area = document.getElementById('responseArea');
  const candidates = providersWithKeys();
  if(candidates.length===0){
    navigator.clipboard.writeText(input).catch(()=>{});
    area.innerHTML = `<div class="response-block"><span class="lbl">Nereikia API rakto</span><div class="response-text">Promptas nukopijuotas į iškarpinę. Naudokite mygtukus aukščiau, kad atidarytumėte nemokamą ChatGPT, Claude, Gemini, Perplexity ar HuggingChat pokalbį, ir įklijuokite ten. Jei norite, kad programėlė vykdytų automatiškai, pridėkite savo API raktą nustatymuose (⚙️) — tada šis mygtukas veiks tiesiogiai.</div></div>`;
    return;
  }
  area.innerHTML = `<div class="response-block"><span class="lbl">AI atsakymas</span><div class="response-text">Kraunama...</div></div>`;
  let lastErr;
  for(const prov of candidates){
    try{
      const text = await callAI('Tu esi naudingas asistentas. Atsakyk aiškiai ir glaustai.', input, prov);
      const usedNote = prov!==candidates[0] ? ` (per ${PROVIDERS[prov].label.split(' ')[0]}, nes pirmasis teikėjas neveikė)` : '';
      area.innerHTML = `<div class="response-block"><span class="lbl">AI atsakymas${usedNote}</span><div class="response-text">${escapeHtml(text)}</div><button class="btn btn-ghost" id="copyRespBtn" style="margin-top:10px;">Kopijuoti atsakymą</button></div>`;
      const copyBtn = document.getElementById('copyRespBtn');
      if(copyBtn) copyBtn.addEventListener('click', ()=>{
        navigator.clipboard.writeText(text).then(()=>{
          copyBtn.textContent = 'Nukopijuota ✓';
          setTimeout(()=>{ copyBtn.textContent = 'Kopijuoti atsakymą'; }, 1800);
        }).catch(()=>{});
      });
      return;
    }catch(err){ lastErr = err; }
  }
  area.innerHTML = `<div class="response-block"><span class="lbl">Klaida</span><div class="response-text">${escapeHtml((lastErr&&lastErr.message)||'Nepavyko gauti atsakymo.')} ${candidates.length>1?'(išbandyti visi '+candidates.length+' sukonfigūruoti teikėjai)':''}</div></div>`;
}

async function gradePrompt(){
  const input = document.getElementById('promptInput').value.trim();
  if(!input) return;
  const block = document.getElementById('gradeBlock');
  block.className = 'grade-block show';
  const sys = 'Tu esi prompt inžinerijos mokytojas. Vertink pateiktą vartotojo promptą pagal aiškumą, kontekstą, konkretumą ir tikslo apibrėžtumą. Atsakyk TIK šiuo formatu, lietuviškai: pirma eilutė "BALAS: X/10", tada 2-3 sakiniai konstruktyvaus atsiliepimo.';
  const candidates = providersWithKeys();
  if(candidates.length===0){
    const evalPrompt = sys + '\n\nVertinamas promptas:\n"""\n' + input + '\n"""';
    navigator.clipboard.writeText(evalPrompt).catch(()=>{});
    block.innerHTML = `<div class="response-text">Vertinimo užklausa nukopijuota į iškarpinę. Įklijuokite ją į nemokamą ChatGPT/Claude/Gemini/HuggingChat pokalbį (mygtukai aukščiau) — gausite balą ir atsiliepimą be jokių API kaštų.</div>`;
    return;
  }
  block.innerHTML = `<div class="response-text">Vertinama...</div>`;
  let lastErr;
  for(const prov of candidates){
    try{
      const text = await callAI(sys, input, prov);
      const scoreMatch = text.match(/BALAS:\s*(\d+)\s*\/\s*10/i);
      const score = scoreMatch ? scoreMatch[1] : '–';
      const feedback = text.replace(/BALAS:\s*\d+\s*\/\s*10/i,'').trim();
      const usedNote = prov!==candidates[0] ? ` <span style="font-size:11px;color:var(--ink-dim);">(per ${PROVIDERS[prov].label.split(' ')[0]})</span>` : '';
      block.innerHTML = `<div class="grade-score">${score}<span>/10</span></div>${usedNote}<div class="grade-feedback">${escapeHtml(feedback)}</div>`;
      return;
    }catch(err){ lastErr = err; }
  }
  block.innerHTML = `<div class="response-text">${escapeHtml((lastErr&&lastErr.message)||'Nepavyko gauti atsiliepimo.')} ${candidates.length>1?'(išbandyti visi '+candidates.length+' sukonfigūruoti teikėjai)':''}</div>`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ---------- Init ---------- */
render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
